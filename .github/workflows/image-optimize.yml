name: Optimize Images

on:
  push:
    branches:
      - main
    # paths:
      # - '*.{jpg,jpeg,png}'
  workflow_dispatch:

jobs:
  compress:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install WebP
        run: sudo apt-get install webp

      - name: Convert to WebP
        run: |
          find -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \) | while read file; do
            cwebp -q 90 "$file" -o "${file%.*}.webp"
            rm "$file"
          done

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto convert to WebP" || echo "No changes"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/bxx-114514/bxx-114514.git HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}